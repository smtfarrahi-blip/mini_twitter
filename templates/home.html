<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="/static/style.css">

<title>Zgrom</title>

<style>
body{
    text-align:center;
}

/* نوار بالا */
.nav{
    display:flex;
    justify-content:space-around;
    padding:14px;
    position:sticky;
    top:0;
    background:rgba(255,255,255,0.06);
    backdrop-filter: blur(15px);
    border-radius:0 0 18px 18px;
}

/* کارت گلس */
.glass{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border-radius: 20px;
    padding: 18px;
    margin: 15px auto;
    width: 92%;
    max-width: 520px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* دکمه‌ها */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#6366f1;
    color:white;
    font-size:18px;
    margin-top:10px;
}

/* input */
input,textarea{
    width:100%;
    padding:14px;
    margin-top:10px;
    border-radius:12px;
    border:none;
    font-size:16px;
}

/* پست */
.post{
    background:rgba(255,255,255,0.06);
    border-radius:18px;
    padding:15px;
    margin:10px 0;
}

/* گروه */
.group{
    background:rgba(99,102,241,0.2);
    padding:12px;
    border-radius:14px;
    margin-top:10px;
}
</style>

</head>

<body>

<!-- NAV -->
<div class="nav">
    <a href="/">🏠</a>
    <a href="/profile">👤</a>
    <a href="/logout">🚪</a>
</div>

<!-- USER CARD -->
<div class="glass">
    <h2>سلام {{user}} 👋</h2>
</div>

<!-- POST FORM -->
<div class="glass">

<h3>📝 پست جدید</h3>

<form method="post" enctype="multipart/form-data">

<textarea name="text" placeholder="چی تو سرت هست؟"></textarea>
<input type="file" name="img">

<button>ارسال پست</button>

</form>

</div>

<!-- POSTS -->
<div class="glass">

<h3>🔥 پست‌ها</h3>

{% for p in posts %}

<div class="post">

    <b>{{p.user}}</b><br>
    <p>{{p.text}}</p>

    {% if p.img %}
        <img src="{{p.img}}" style="width:100%;border-radius:12px;margin-top:10px;">
    {% endif %}

    <p>❤️ {{p.likes}} | 💔 {{p.dislikes}}</p>

</div>

{% endfor %}

</div>

<!-- GROUPS -->
<div class="glass">

<h3>👥 گروه‌ها</h3>

<form action="/create_group" method="post">
    <input name="name" placeholder="اسم گروه">
    <button>ساخت گروه</button>
</form>

<hr>

{% for g in groups %}

<div class="group">

    <b>{{g.name}}</b><br>

    <a href="/group/{{g.name}}">ورود</a> |
    <a href="/join/{{g.name}}">عضویت</a>

</div>

{% endfor %}

</div>

</body>
</html>
